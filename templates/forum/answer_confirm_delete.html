{% extends 'base.html' %}

{% block title %}Удаление ответа{% endblock %}

{% block content %}
    <div class="auth-card">
        <h2>Удалить ответ?</h2>
        <p>Вы уверены, что хотите удалить этот ответ?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'theme_detail' object.theme.pk %}" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
{% endblock %}
